<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 托管 - SyncAgent</title>
    <link rel="stylesheet" href="/styles/main.css">
    <style>
        .mcps-page { max-width: 720px; margin: 3rem auto 4rem; }
        .mcps-page h2 {
            font-size: 1.75rem; font-weight: 700; text-align: center;
            letter-spacing: -0.03em; margin-bottom: 0.35rem;
        }
        .mcps-sub {
            text-align: center; color: var(--fg-secondary);
            font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6;
        }
        .state-box {
            padding: 2rem 1.5rem; border: 1px solid var(--border);
            border-radius: var(--radius-lg); text-align: center;
            color: var(--fg-secondary); font-size: 0.9375rem;
        }
        .state-box a { color: var(--fg); font-weight: 500; text-decoration: underline; text-underline-offset: 2px; }
        .mcp-card {
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 1.15rem 1.25rem; margin: 0.75rem 0; background: var(--bg);
        }
        .mcp-card:hover { border-color: var(--border-hover); }
        .mcp-card-head {
            display: flex; justify-content: space-between; gap: 1rem; align-items: flex-start;
        }
        .mcp-name { font-weight: 600; font-size: 1rem; letter-spacing: -0.01em; }
        .mcp-meta { font-size: 0.8125rem; color: var(--fg-tertiary); margin-top: 0.25rem; word-break: break-all; }
        .mcp-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
        .mcp-actions button {
            padding: 0.35rem 0.75rem; border-radius: 9999px; border: 1px solid var(--border);
            background: var(--bg); font-size: 0.75rem; font-weight: 500; cursor: pointer;
            font-family: inherit; color: var(--fg);
        }
        .mcp-actions button:hover { border-color: var(--border-hover); }
        .mcp-actions .danger { color: var(--danger); border-color: var(--danger-border); }
        .mcp-actions .danger:hover { background: var(--danger-bg); border-color: var(--danger); }
        .form-card {
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 1.35rem 1.35rem 1.15rem; margin: 1.5rem 0 2rem; background: var(--bg);
        }
        .form-card h3 {
            font-size: 0.9375rem; font-weight: 600; margin-bottom: 1rem; letter-spacing: -0.01em;
        }
        .field { margin-bottom: 0.85rem; }
        .field label {
            display: block; font-size: 0.75rem; font-weight: 500;
            color: var(--fg-secondary); margin-bottom: 0.3rem;
        }
        .field input, .field select, .field textarea {
            width: 100%; padding: 0.55rem 0.75rem; border: 1px solid var(--border);
            border-radius: var(--radius); font-size: 0.875rem; font-family: inherit;
            background: var(--bg); color: var(--fg);
        }
        .field input:focus, .field select:focus, .field textarea:focus {
            outline: none; border-color: var(--fg);
        }
        .field textarea { min-height: 72px; resize: vertical; font-family: var(--mono); font-size: 0.8rem; }
        .field .help { font-size: 0.75rem; color: var(--fg-tertiary); margin-top: 0.25rem; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .form-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 0.5rem; }
        .form-actions button {
            padding: 0.5rem 1rem; border-radius: 9999px; font-size: 0.8125rem;
            font-weight: 500; cursor: pointer; font-family: inherit; border: 1px solid var(--border);
            background: var(--bg); color: var(--fg);
        }
        .form-actions .primary {
            background: var(--fg); color: #fff; border-color: var(--fg);
        }
        .form-actions .primary:hover { background: #333; }
        .form-actions .primary:disabled { opacity: 0.4; cursor: not-allowed; }
        details.advanced {
            margin: 0.5rem 0 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.65rem 0.85rem;
            background: var(--bg-secondary);
        }
        details.advanced summary {
            cursor: pointer;
            font-size: 0.8125rem;
            font-weight: 500;
            color: var(--fg-secondary);
            user-select: none;
        }
        details.advanced[open] summary { margin-bottom: 0.35rem; }
        .test-result {
            margin-top: 0.75rem;
            padding: 0.65rem 0.85rem;
            border-radius: var(--radius);
            font-size: 0.8125rem;
            line-height: 1.5;
            border: 1px solid var(--border);
        }
        .test-result.ok {
            background: #f0fdf4;
            border-color: #bbf7d0;
            color: #166534;
        }
        .test-result.fail {
            background: #fef2f2;
            border-color: #fecaca;
            color: #991b1b;
        }
        .test-result.pending {
            background: var(--bg-secondary);
            color: var(--fg-secondary);
        }
        .hint-box {
            margin-top: 1.5rem; padding: 0.85rem 1rem; background: var(--bg-secondary);
            border-left: 2px solid var(--fg); border-radius: 0 var(--radius) var(--radius) 0;
            font-size: 0.8125rem; color: var(--fg-secondary); line-height: 1.6;
        }
        .hint-box code {
            font-family: var(--mono); font-size: 0.85em; padding: 0.1rem 0.3rem;
            background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 4px;
        }
        .tag {
            display: inline-block; padding: 0.1rem 0.45rem; border-radius: 9999px;
            border: 1px solid var(--border); font-size: 0.7rem; color: var(--fg-secondary);
            margin-right: 0.35rem; font-weight: 500;
        }
        @media (max-width: 640px) {
            .row-2 { grid-template-columns: 1fr; }
            .mcp-card-head { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-bar">
                <a href="/index.html" class="brand"><h1>SyncAgent</h1></a>
                <div class="nav-actions" id="nav-actions"></div>
            </div>
        </header>

        <main class="mcps-page">
            <h2>MCP 托管</h2>
            <p class="mcps-sub">在平台填写 MCP 与密钥 · 对 AI 说「同步 MCP 到本地」即可写入本机<br>密钥只存在你的账号下，不经养成资产备份流程</p>

            <div id="content"><div class="state-box">加载中…</div></div>

            <div class="form-card" id="form-card" style="display:none;">
                <h3 id="form-title">添加 MCP</h3>
                <input type="hidden" id="edit-id" value="">

                <div class="field">
                    <label for="f-name">名称</label>
                    <input id="f-name" placeholder="例如 zoho-books" autocomplete="off">
                </div>
                <div class="field" id="field-url">
                    <label for="f-url">地址 URL</label>
                    <input id="f-url" placeholder="https://example.com/mcp" autocomplete="off">
                </div>
                <div class="field" id="field-token">
                    <label for="f-token">访问密钥（可选）</label>
                    <input id="f-token" type="password" placeholder="Bearer sk-… 或直接粘贴 token" autocomplete="off">
                    <div class="help">会写入 Authorization 请求头。编辑时留空表示不改原密钥。</div>
                </div>

                <details class="advanced" id="advanced-box">
                    <summary>高级选项（本地命令 / 额外 headers）</summary>
                    <div class="field" style="margin-top:0.85rem;">
                        <label for="f-transport">类型</label>
                        <select id="f-transport">
                            <option value="http">远程 HTTP</option>
                            <option value="stdio">本地命令 stdio</option>
                        </select>
                    </div>
                    <div class="field" id="field-command" style="display:none;">
                        <label for="f-command">命令 command</label>
                        <input id="f-command" placeholder="npx" autocomplete="off">
                    </div>
                    <div class="field" id="field-args" style="display:none;">
                        <label for="f-args">参数（每行一个）</label>
                        <textarea id="f-args" placeholder="-y&#10;@modelcontextprotocol/server-xxx"></textarea>
                    </div>
                    <div class="field">
                        <label for="f-headers">额外 headers（JSON，可选）</label>
                        <textarea id="f-headers" placeholder='{"X-Custom": "value"}'></textarea>
                    </div>
                    <div class="field">
                        <label for="f-env">环境变量 env（JSON，可选）</label>
                        <textarea id="f-env" placeholder='{"API_KEY": "..."}'></textarea>
                    </div>
                    <div class="field">
                        <label for="f-note">备注</label>
                        <input id="f-note" placeholder="可选" autocomplete="off">
                    </div>
                </details>

                <div class="form-actions">
                    <button type="button" id="btn-cancel" style="display:none;">取消</button>
                    <button type="button" id="btn-test">测试连接</button>
                    <button type="button" class="primary" id="btn-save">保存</button>
                </div>
                <div id="test-result" class="test-result" style="display:none;"></div>
            </div>

            <div class="hint-box" id="hint-box" style="display:none;">
                添加后，在智能体里说：<code>把云端 MCP 同步到本地</code>
            </div>
        </main>

        <footer>
            <p>© 2026 SyncAgent · <a href="/docs.html">文档</a> · <a href="/backups.html">我的备份</a></p>
        </footer>
    </div>

    <script src="/scripts/app.js"></script>
    <script>
        // 注意：不要再声明 const API_BASE——app.js 已在全局声明，重复会 SyntaxError，整页脚本不执行。
        function apiBase() {
            if (typeof API_BASE !== 'undefined' && API_BASE) return API_BASE;
            return window.location.hostname === 'localhost'
                ? 'http://localhost:8000'
                : 'https://web-production-1fa7e.up.railway.app';
        }

        const content = document.getElementById('content');
        const formCard = document.getElementById('form-card');
        const hintBox = document.getElementById('hint-box');

        function token() { return localStorage.getItem('syncagent_token'); }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function showLogin() {
            content.innerHTML = '<div class="state-box">请先<a href="/setup.html">登录</a>后再管理 MCP。</div>';
            if (formCard) formCard.style.display = 'none';
            if (hintBox) hintBox.style.display = 'none';
        }

        function parseJsonObject(text, fieldName) {
            const t = (text || '').trim();
            if (!t) return {};
            let v;
            try { v = JSON.parse(t); }
            catch (e) { throw new Error(fieldName + ' 不是合法 JSON'); }
            if (typeof v !== 'object' || v === null || Array.isArray(v)) {
                throw new Error(fieldName + ' 必须是 JSON 对象');
            }
            return v;
        }

        function toggleTransport() {
            const el = document.getElementById('f-transport');
            if (!el) return;
            const t = el.value;
            const urlF = document.getElementById('field-url');
            const cmdF = document.getElementById('field-command');
            const argsF = document.getElementById('field-args');
            if (urlF) urlF.style.display = t === 'http' ? '' : 'none';
            if (cmdF) cmdF.style.display = t === 'stdio' ? '' : 'none';
            if (argsF) argsF.style.display = t === 'stdio' ? '' : 'none';
        }

        function resetForm() {
            const editId = document.getElementById('edit-id');
            if (editId) editId.value = '';
            const title = document.getElementById('form-title');
            if (title) title.textContent = '添加 MCP';
            ['f-name','f-url','f-token','f-command','f-args','f-headers','f-env','f-note'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
            const nameEl = document.getElementById('f-name');
            if (nameEl) nameEl.disabled = false;
            const tr = document.getElementById('f-transport');
            if (tr) tr.value = 'http';
            const adv = document.getElementById('advanced-box');
            if (adv) adv.open = false;
            const cancel = document.getElementById('btn-cancel');
            if (cancel) cancel.style.display = 'none';
            toggleTransport();
        }

        async function loadList() {
            const t = token();
            if (!t) { showLogin(); return; }

            if (formCard) formCard.style.display = '';
            if (hintBox) hintBox.style.display = '';

            const url = apiBase() + '/api/mcps';
            content.innerHTML = '<div class="state-box">正在请求…<br><code style="font-size:0.75rem;word-break:break-all;">' +
                escapeHtml(url) + '</code></div>';

            let res;
            const ctrl = typeof AbortController !== 'undefined' ? new AbortController() : null;
            const timer = ctrl ? setTimeout(() => ctrl.abort(), 12000) : null;
            try {
                res = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + t },
                    signal: ctrl ? ctrl.signal : undefined,
                });
            } catch (e) {
                const msg = (e && e.name === 'AbortError')
                    ? '请求超时（12s）。请检查能否访问 API，或关闭/绕过本地代理后再试。'
                    : ('无法连接服务器：' + String(e && e.message || e));
                content.innerHTML = '<div class="state-box">' + escapeHtml(msg) +
                    '<br><br>API：<code style="font-size:0.75rem;word-break:break-all;">' + escapeHtml(url) + '</code>' +
                    '<br><a href="/setup.html">重新登录</a> · <a href="#" id="retry-load">重试</a></div>';
                const retry = document.getElementById('retry-load');
                if (retry) retry.addEventListener('click', (ev) => { ev.preventDefault(); loadList(); });
                return;
            } finally {
                if (timer) clearTimeout(timer);
            }
            if (res.status === 401) { showLogin(); return; }
            if (!res.ok) {
                let detail = 'HTTP ' + res.status;
                try {
                    const err = await res.json();
                    if (err && err.detail) detail += ' · ' + (typeof err.detail === 'string' ? err.detail : JSON.stringify(err.detail));
                } catch (_) {}
                content.innerHTML = '<div class="state-box">加载失败：' + escapeHtml(detail) +
                    '<br><a href="/setup.html">重新登录</a> · <a href="#" id="retry-load">重试</a></div>';
                const retry = document.getElementById('retry-load');
                if (retry) retry.addEventListener('click', (ev) => { ev.preventDefault(); loadList(); });
                return;
            }
            try {
                const data = await res.json();
                renderList(data.servers || []);
            } catch (e) {
                content.innerHTML = '<div class="state-box">解析响应失败</div>';
            }
        }

        function renderList(servers) {
            if (!servers.length) {
                content.innerHTML = '<div class="state-box">还没有托管 MCP。<br>在下方表单添加一条（可填密钥），再让 AI 同步到本地。</div>';
                return;
            }
            content.innerHTML = servers.map(s => {
                const endpoint = s.transport === 'stdio'
                    ? escapeHtml((s.command || '') + ' ' + (s.args || []).join(' '))
                    : escapeHtml(s.url || '');
                return (
                    '<div class="mcp-card" data-id="' + escapeHtml(s.id) + '">' +
                      '<div class="mcp-card-head">' +
                        '<div>' +
                          '<div class="mcp-name">' + escapeHtml(s.name) + '</div>' +
                          '<div class="mcp-meta">' +
                            '<span class="tag">' + escapeHtml(s.transport || 'http') + '</span>' +
                            endpoint +
                            (s.has_secrets ? ' · 含密钥' : '') +
                          '</div>' +
                          (s.note ? '<div class="mcp-meta">' + escapeHtml(s.note) + '</div>' : '') +
                        '</div>' +
                        '<div class="mcp-actions">' +
                          '<button type="button" data-act="edit">编辑</button>' +
                          '<button type="button" class="danger" data-act="del">删除</button>' +
                        '</div>' +
                      '</div>' +
                    '</div>'
                );
            }).join('');

            content.querySelectorAll('[data-act="del"]').forEach(btn => {
                btn.addEventListener('click', () => delMcp(btn.closest('.mcp-card').dataset.id));
            });
            content.querySelectorAll('[data-act="edit"]').forEach(btn => {
                btn.addEventListener('click', () => startEdit(btn.closest('.mcp-card').dataset.id, servers));
            });
        }

        function startEdit(id, servers) {
            const s = servers.find(x => x.id === id);
            if (!s) return;
            document.getElementById('edit-id').value = s.id;
            document.getElementById('form-title').textContent = '编辑 ' + s.name;
            document.getElementById('f-name').value = s.name || '';
            document.getElementById('f-transport').value = s.transport || 'http';
            document.getElementById('f-url').value = s.url || '';
            document.getElementById('f-token').value = '';
            document.getElementById('f-command').value = s.command || '';
            document.getElementById('f-args').value = (s.args || []).join('\n');
            document.getElementById('f-headers').value = '';
            document.getElementById('f-env').value = '';
            document.getElementById('f-note').value = s.note || '';
            document.getElementById('btn-cancel').style.display = '';
            // 若是 stdio 或有 env，自动展开高级
            const isStdio = (s.transport || 'http') === 'stdio';
            const adv = document.getElementById('advanced-box');
            if (adv) adv.open = isStdio;
            toggleTransport();
            formCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        async function delMcp(id) {
            if (!confirm('确定删除这条托管 MCP？本地已写入的配置不会自动删除。')) return;
            const t = token();
            if (!t) { showLogin(); return; }
            try {
                const res = await fetch(apiBase() + '/api/mcps/' + encodeURIComponent(id), {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + t },
                });
                if (res.status === 401) { showLogin(); return; }
                if (!res.ok && res.status !== 404) {
                    alert('删除失败 HTTP ' + res.status);
                    return;
                }
                await loadList();
            } catch (e) {
                alert('删除失败：无法连接服务器');
            }
        }

        function buildMcpPayloadFromForm() {
            const editId = document.getElementById('edit-id').value;
            let name = document.getElementById('f-name').value.trim();
            const transport = document.getElementById('f-transport').value || 'http';
            const url = document.getElementById('f-url').value.trim();
            const tokenRaw = document.getElementById('f-token').value.trim();
            const command = document.getElementById('f-command').value.trim();
            const args = document.getElementById('f-args').value.split('\n').map(s => s.trim()).filter(Boolean);
            const note = document.getElementById('f-note').value.trim();

            if (!name) {
                try {
                    const u = new URL(url);
                    name = (u.hostname || 'mcp').replace(/\./g, '-').replace(/[^a-zA-Z0-9_-]/g, '').slice(0, 32) || 'mcp';
                } catch (_) {
                    name = 'mcp';
                }
            }
            if (!/^[a-zA-Z0-9_-]+$/.test(name)) {
                throw new Error('名称只能包含字母、数字、-、_');
            }
            if (transport === 'http' && !url) {
                throw new Error('请填写 URL');
            }
            if (transport === 'stdio' && !command) {
                throw new Error('本地命令类型请填写 command');
            }

            let headers = {};
            let env = {};
            let headersProvided = false;
            let envProvided = false;
            const hRaw = document.getElementById('f-headers').value.trim();
            const eRaw = document.getElementById('f-env').value.trim();
            if (hRaw) {
                headers = parseJsonObject(hRaw, 'headers');
                headersProvided = true;
            }
            if (eRaw) {
                env = parseJsonObject(eRaw, 'env');
                envProvided = true;
            }
            if (tokenRaw) {
                const auth = /^bearer\s+/i.test(tokenRaw) ? tokenRaw : ('Bearer ' + tokenRaw);
                headers = Object.assign({}, headers, { Authorization: auth });
                headersProvided = true;
            }
            const looksMasked = (obj) => Object.values(obj).some(v => String(v).includes('****') || String(v) === '********');
            if (editId && headersProvided && looksMasked(headers)) headersProvided = false;
            if (editId && envProvided && looksMasked(env)) envProvided = false;

            const body = { name, transport, url, command, args, note };
            if (editId) body.id = editId;
            if (!editId || headersProvided) body.headers = headers;
            if (!editId || envProvided) body.env = env;
            return body;
        }

        function showTestResult(kind, text) {
            const el = document.getElementById('test-result');
            if (!el) return;
            el.style.display = '';
            el.className = 'test-result ' + (kind || '');
            el.textContent = text;
        }

        async function onTest() {
            const t = token();
            if (!t) { showLogin(); return; }
            let payload;
            try {
                payload = buildMcpPayloadFromForm();
            } catch (e) {
                showTestResult('fail', e.message || String(e));
                return;
            }
            const btn = document.getElementById('btn-test');
            btn.disabled = true;
            const old = btn.textContent;
            btn.textContent = '测试中…';
            showTestResult('pending', '正在从服务端探测连接…');
            try {
                const res = await fetch(apiBase() + '/api/mcps/test', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + t,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload),
                });
                if (res.status === 401) { showLogin(); return; }
                const data = await res.json().catch(() => ({}));
                if (!res.ok) {
                    showTestResult('fail', data.detail || ('测试失败 HTTP ' + res.status));
                    return;
                }
                const ms = data.latency_ms != null ? '（' + data.latency_ms + 'ms）' : '';
                if (data.ok) {
                    showTestResult('ok', (data.message || '连接成功') + ms);
                } else if (data.skipped) {
                    showTestResult('pending', data.message || '已跳过测试');
                } else {
                    let msg = (data.message || '连接失败') + ms;
                    if (data.body_preview) msg += '\n' + String(data.body_preview).slice(0, 200);
                    showTestResult('fail', msg);
                }
            } catch (e) {
                showTestResult('fail', '无法连接 SyncAgent API：' + (e && e.message || e));
            } finally {
                btn.disabled = false;
                btn.textContent = old;
            }
        }

        function bindForm() {
            const tr = document.getElementById('f-transport');
            if (tr) tr.addEventListener('change', toggleTransport);
            const cancel = document.getElementById('btn-cancel');
            if (cancel) cancel.addEventListener('click', resetForm);
            const save = document.getElementById('btn-save');
            if (save) save.addEventListener('click', onSave);
            const testBtn = document.getElementById('btn-test');
            if (testBtn) testBtn.addEventListener('click', onTest);
        }

        async function onSave() {
            const t = token();
            if (!t) { showLogin(); return; }

            let body;
            try {
                body = buildMcpPayloadFromForm();
            } catch (e) {
                alert(e.message || String(e));
                return;
            }
            const editId = body.id || '';
            const saveBody = Object.assign({}, body);
            delete saveBody.id;

            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.textContent = '保存中…';

            try {
                const res = await fetch(
                    editId ? apiBase() + '/api/mcps/' + encodeURIComponent(editId) : apiBase() + '/api/mcps',
                    {
                        method: editId ? 'PUT' : 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + t,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(saveBody),
                    }
                );
                if (res.status === 401) { showLogin(); return; }
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    alert(err.detail || ('保存失败 HTTP ' + res.status));
                    return;
                }
                resetForm();
                const tr = document.getElementById('test-result');
                if (tr) { tr.style.display = 'none'; tr.textContent = ''; }
                await loadList();
            } catch (e) {
                alert('保存失败：无法连接服务器');
            } finally {
                btn.disabled = false;
                btn.textContent = '保存';
            }
        }

        function boot() {
            try {
                if (typeof renderAuthNav === 'function') renderAuthNav();
            } catch (e) { console.error(e); }
            try {
                bindForm();
                toggleTransport();
                loadList();
            } catch (e) {
                console.error(e);
                if (content) {
                    content.innerHTML = '<div class="state-box">页面初始化失败：' + escapeHtml(String(e && e.message || e)) +
                        '<br>请硬刷新（Cmd+Shift+R）后重试。</div>';
                }
            }
        }

        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', boot);
        } else {
            boot();
        }
    </script>
</body>
</html>
