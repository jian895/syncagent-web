<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的备份 - SyncAgent</title>
    <link rel="stylesheet" href="/styles/main.css">
    <style>
        .backups-page {
            max-width: 900px;
            margin: 3rem auto;
        }
        .backups-page h2 {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .backups-sub {
            text-align: center;
            color: var(--text-light);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }
        .state-box {
            padding: 2.5rem;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            color: var(--text-light);
        }
        .state-box a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .backup-card {
            margin: 1.25rem 0;
            padding: 1.75rem 2rem;
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }
        .backup-card:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow-lg);
        }
        .backup-card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            cursor: pointer;
        }
        .backup-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text);
        }
        .backup-meta {
            font-size: 0.875rem;
            color: var(--text-light);
            margin-top: 0.35rem;
        }
        .backup-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        .chip {
            padding: 0.25rem 0.75rem;
            background: var(--bg-tertiary);
            border-radius: 9999px;
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 500;
        }
        .chip.chip-legacy {
            color: var(--text-muted);
            background: var(--bg-secondary);
            text-decoration: line-through;
        }
        .toggle-btn {
            padding: 0.6rem 1.25rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text);
            white-space: nowrap;
            transition: all 0.2s;
        }
        .toggle-btn:hover {
            background: var(--bg-tertiary);
        }
        .backup-actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        .delete-btn {
            padding: 0.6rem 1.25rem;
            background: #fff;
            border: 1px solid #fecaca;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            color: #dc2626;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .delete-btn:hover:not(:disabled) {
            background: #fef2f2;
            border-color: #dc2626;
        }
        .delete-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .restore-hint-btn {
            padding: 0.6rem 1.25rem;
            background: #fff;
            border: 1px solid var(--primary-light);
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--primary);
            white-space: nowrap;
            transition: all 0.2s;
        }
        .restore-hint-btn:hover {
            background: #eef2ff;
        }
        .backup-detail {
            margin-top: 1.5rem;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }
        .kind-block {
            margin-bottom: 1.25rem;
        }
        .kind-block:last-child {
            margin-bottom: 0;
        }
        .kind-head {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .kind-head .kind-label {
            font-size: 0.95rem;
        }
        .kind-head .kind-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .kind-empty {
            font-size: 0.875rem;
            color: var(--text-muted);
            padding: 0.5rem 0;
        }
        .file-item {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 0.5rem;
            overflow: hidden;
            background: var(--bg-secondary);
        }
        .file-item-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            padding: 0.65rem 1rem;
            cursor: pointer;
            font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
            font-size: 0.8rem;
            color: var(--text);
        }
        .file-item-head:hover {
            background: var(--bg-tertiary);
        }
        .file-relpath {
            word-break: break-all;
        }
        .file-size {
            color: var(--text-muted);
            font-size: 0.75rem;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .file-item pre {
            margin: 0;
            padding: 1rem;
            background: var(--text);
            color: var(--bg);
            font-family: 'SF Mono', 'Monaco', 'Courier New', monospace;
            font-size: 0.78rem;
            line-height: 1.55;
            max-height: 320px;
            overflow: auto;
            border-top: 1px solid rgba(255,255,255,0.08);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .legacy-note {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.75rem;
            padding: 0.6rem 0.85rem;
            background: var(--bg-secondary);
            border-radius: var(--radius);
        }
        .logout-link {
            display: inline-block;
            margin-top: 1rem;
            color: var(--text-light);
            font-size: 0.875rem;
            cursor: pointer;
            text-decoration: none;
        }
        .logout-link:hover {
            color: var(--primary);
        }
        @media (max-width: 640px) {
            .backup-card-head {
                flex-direction: column;
                align-items: flex-start;
            }
            .backup-actions {
                width: 100%;
            }
            .backup-actions button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-bar">
                <a href="/index.html" class="brand"><h1>🔄 SyncAgent</h1></a>
                <div class="nav-actions" id="nav-actions"></div>
            </div>
        </header>

        <main class="backups-page">
            <h2>我的备份</h2>
            <p class="backups-sub">技能 · 记忆 · 人格 — 密钥本机配置，不进云端</p>
            <div id="content">
                <div class="state-box">加载中…</div>
            </div>
        </main>

        <footer>
            <p>© 2026 SyncAgent · <a href="/docs.html">文档</a> · <a href="/setup.html">开始使用</a></p>
        </footer>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:8000'
            : 'https://web-production-1fa7e.up.railway.app';

        const content = document.getElementById('content');

        // kind 中文标签；mcp 类为已弃用
        const KIND_LABELS = {
            skills: '技能',
            memory: '记忆',
            soul: '人格 · SOUL',
            identity: '人格 · IDENTITY',
            user: '人格 · USER',
            agents_md: '项目指令',
            rules: '规则',
            rules_dir: '规则目录',
            mcp: 'MCP（已弃用）',
            mcp_project: 'MCP 项目（已弃用）',
            mcp_config: 'MCP（已弃用）',
            models: '模型（已弃用）',
            connectors: '连接器（已弃用）',
            env: '环境变量（已弃用）',
        };
        const LEGACY_KINDS = new Set(['mcp', 'mcp_project', 'mcp_config', 'models', 'connectors', 'env']);

        function kindLabel(k) {
            return KIND_LABELS[k] || k;
        }
        function isLegacyKind(k) {
            return LEGACY_KINDS.has(k) || String(k).startsWith('mcp');
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function fmtTime(iso) {
            if (!iso) return '未知时间';
            const d = new Date(iso);
            if (isNaN(d.getTime())) return iso;
            return d.toLocaleString('zh-CN', { hour12: false });
        }

        function fmtBytes(n) {
            if (n < 1024) return n + ' B';
            if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
            return (n / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function showLoginPrompt() {
            content.innerHTML =
                '<div class="state-box">请先<a href="/setup.html">用 Google 登录</a>，然后回到此页查看你的云端备份。</div>';
        }

        function showError(msg) {
            content.innerHTML =
                '<div class="state-box">加载失败：' + escapeHtml(msg) +
                '<br><a class="logout-link" id="relogin">重新登录</a></div>';
            const relogin = document.getElementById('relogin');
            if (relogin) relogin.addEventListener('click', logout);
        }

        function logout() {
            localStorage.removeItem('syncagent_token');
            window.location.href = '/index.html';
        }

        function getToken() {
            return localStorage.getItem('syncagent_token');
        }

        function emailFromToken(token) {
            try {
                const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                return payload.email || '';
            } catch (e) {
                return '';
            }
        }

        function renderAuthNav() {
            const nav = document.getElementById('nav-actions');
            if (!nav) return;
            const token = getToken();
            if (!token) {
                nav.innerHTML =
                    '<a href="/docs.html" class="nav-btn nav-btn-ghost">文档</a>' +
                    '<a href="/setup.html" class="nav-btn nav-btn-primary">登录 / 开始使用</a>';
                return;
            }
            const email = emailFromToken(token);
            nav.innerHTML =
                (email ? '<span class="nav-user" title="' + escapeHtml(email) + '">' + escapeHtml(email) + '</span>' : '') +
                '<a href="/backups.html" class="nav-btn">📦 我的备份</a>' +
                '<a href="/setup.html" class="nav-btn nav-btn-ghost">安装命令</a>' +
                '<button type="button" class="nav-btn nav-btn-ghost" id="nav-logout">退出</button>';
            const btn = document.getElementById('nav-logout');
            if (btn) btn.addEventListener('click', logout);
        }

        // 把任意 kind 值规整成 [{relpath, content}]（兼容数组 / 字典 / 字符串 / null）
        function normalizeFiles(kind, value) {
            if (value == null || value === '' || (Array.isArray(value) && value.length === 0) ||
                (typeof value === 'object' && !Array.isArray(value) && Object.keys(value).length === 0)) {
                return [];
            }
            if (Array.isArray(value)) {
                return value.map((f, i) => {
                    if (f && typeof f === 'object' && 'content' in f) {
                        return { relpath: f.relpath || (kind + '/' + i), content: String(f.content ?? '') };
                    }
                    if (typeof f === 'string') {
                        return { relpath: kind + '/' + i, content: f };
                    }
                    return null;
                }).filter(Boolean);
            }
            if (typeof value === 'string') {
                return [{ relpath: kind + '（旧格式）', content: value }];
            }
            if (typeof value === 'object') {
                return Object.keys(value).map(k => ({
                    relpath: k,
                    content: typeof value[k] === 'string' ? value[k] : JSON.stringify(value[k], null, 2)
                }));
            }
            return [];
        }

        function renderKindTree(config) {
            if (!config || typeof config !== 'object') {
                return '<div class="kind-empty">无内容</div>';
            }

            const kinds = Object.keys(config);
            // 非文件辅助键跳过展示
            const skip = new Set(['metadata', 'checked_paths', 'excluded', 'secret_policy', 'workspace', '_meta', 'notes']);
            const active = kinds.filter(k => !skip.has(k));
            if (!active.length) return '<div class="kind-empty">无内容</div>';

            // 养成资产优先，legacy 靠后
            active.sort((a, b) => {
                const la = isLegacyKind(a) ? 1 : 0;
                const lb = isLegacyKind(b) ? 1 : 0;
                if (la !== lb) return la - lb;
                return a.localeCompare(b);
            });

            let html = '';
            let hasLegacy = false;

            active.forEach(kind => {
                const files = normalizeFiles(kind, config[kind]);
                const legacy = isLegacyKind(kind);
                if (legacy) hasLegacy = true;

                html += '<div class="kind-block">';
                html += '<div class="kind-head">';
                html += '<span class="kind-label' + (legacy ? ' chip-legacy' : '') + '">' +
                    escapeHtml(kindLabel(kind)) + '</span>';
                if (files.length) {
                    html += '<span class="kind-count">' + files.length + ' 个文件</span>';
                } else {
                    html += '<span class="kind-count">本机不存在 / 空</span>';
                }
                html += '</div>';

                if (!files.length) {
                    html += '<div class="kind-empty">—</div>';
                } else {
                    files.forEach((f, idx) => {
                        const size = new Blob([f.content || '']).size;
                        const id = 'f-' + Math.random().toString(36).slice(2, 9);
                        html += '<div class="file-item">';
                        html += '<div class="file-item-head" data-file-toggle="' + id + '">';
                        html += '<span class="file-relpath">' + escapeHtml(f.relpath) + '</span>';
                        html += '<span class="file-size">' + fmtBytes(size) + '</span>';
                        html += '</div>';
                        html += '<pre id="' + id + '" style="display:none;">' + escapeHtml(f.content || '') + '</pre>';
                        html += '</div>';
                    });
                }
                html += '</div>';
            });

            if (hasLegacy) {
                html += '<div class="legacy-note">含已弃用的 MCP / 连接配置项。新备份不再收录它们；恢复时平台也会跳过，不会写回本地。</div>';
            }
            return html;
        }

        async function loadBackups() {
            const token = getToken();
            if (!token) {
                showLoginPrompt();
                return;
            }

            let res;
            try {
                res = await fetch(API_BASE + '/api/backups', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
            } catch (e) {
                showError('无法连接服务器');
                return;
            }

            if (res.status === 401) {
                showLoginPrompt();
                return;
            }
            if (!res.ok) {
                showError('HTTP ' + res.status);
                return;
            }

            const data = await res.json();
            renderList(data.backups || []);
        }

        function renderList(backups) {
            if (!backups.length) {
                content.innerHTML =
                    '<div class="state-box">云端还没有养成资产备份。<br>' +
                    '在智能体里说「备份我的配置」，会上传技能 / 记忆 / 人格。<br>' +
                    '密钥与 MCP 连接配置不会上传，始终本机配置。' +
                    '<br><a class="logout-link" id="logout">退出登录</a></div>';
                const lo = document.getElementById('logout');
                if (lo) lo.addEventListener('click', logout);
                return;
            }

            const parts = backups.map((b, i) => {
                const chips = (b.items || []).map(k => {
                    const cls = isLegacyKind(k) ? 'chip chip-legacy' : 'chip';
                    return '<span class="' + cls + '">' + escapeHtml(kindLabel(k)) + '</span>';
                }).join('');
                return (
                    '<div class="backup-card" data-client="' + escapeHtml(b.client_type) + '">' +
                        '<div class="backup-card-head" data-idx="' + i + '">' +
                            '<div>' +
                                '<div class="backup-title">' + escapeHtml(b.display_name || b.client_type) + '</div>' +
                                '<div class="backup-meta">' + escapeHtml(b.client_type) +
                                    ' · ' + (b.item_count || 0) + ' 项 · 更新于 ' + escapeHtml(fmtTime(b.synced_at)) +
                                '</div>' +
                                '<div class="backup-chips">' + chips + '</div>' +
                            '</div>' +
                            '<div class="backup-actions">' +
                                '<button class="toggle-btn" type="button">查看内容</button>' +
                                '<button class="restore-hint-btn" type="button">恢复提示</button>' +
                                '<button class="delete-btn" type="button">删除</button>' +
                            '</div>' +
                        '</div>' +
                        '<div class="backup-detail" style="display:none;"></div>' +
                    '</div>'
                );
            });

            content.innerHTML =
                parts.join('') +
                '<div style="text-align:center;"><a class="logout-link" id="logout">退出登录</a></div>';

            document.querySelectorAll('.backup-card-head').forEach(head => {
                // 点整行展开（按钮自己 stopPropagation）
                head.addEventListener('click', (e) => {
                    if (e.target.closest('.delete-btn') || e.target.closest('.restore-hint-btn')) return;
                    if (e.target.closest('.toggle-btn') || e.target === head || e.target.closest('.backup-card-head > div:first-child')) {
                        toggleDetail(head);
                    }
                });
            });
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleDetail(btn.closest('.backup-card-head'));
                });
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteBackup(btn.closest('.backup-card'));
                });
            });
            document.querySelectorAll('.restore-hint-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyRestoreHint(btn.closest('.backup-card'));
                });
            });
            const lo = document.getElementById('logout');
            if (lo) lo.addEventListener('click', logout);
        }

        function copyRestoreHint(card) {
            const clientType = card.getAttribute('data-client');
            const text =
                '请调用 syncagent_restore，参数 from_client=' + clientType +
                '。拿到写回计划后，按每个 file 的 relpath 把 content 写回该客户端配置根目录（写入前若目录不存在请创建；覆盖前先向我确认）。';
            const btn = card.querySelector('.restore-hint-btn');
            const done = () => {
                if (!btn) return;
                const old = btn.textContent;
                btn.textContent = '✓ 已复制';
                setTimeout(() => { btn.textContent = old; }, 1800);
            };
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(done).catch(() => {
                    prompt('复制以下内容发给 AI：', text);
                });
            } else {
                prompt('复制以下内容发给 AI：', text);
            }
        }

        async function deleteBackup(card) {
            const clientType = card.getAttribute('data-client');
            const title = (card.querySelector('.backup-title') || {}).textContent || clientType;
            if (!confirm('确定删除「' + title + '」的云端备份吗？此操作不可恢复。')) return;

            const token = getToken();
            if (!token) { showLoginPrompt(); return; }

            const delBtn = card.querySelector('.delete-btn');
            if (delBtn) { delBtn.disabled = true; delBtn.textContent = '删除中…'; }

            let res;
            try {
                res = await fetch(API_BASE + '/api/backups/' + encodeURIComponent(clientType), {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
            } catch (e) {
                if (delBtn) { delBtn.disabled = false; delBtn.textContent = '删除'; }
                alert('删除失败：无法连接服务器');
                return;
            }

            if (res.status === 401) { showLoginPrompt(); return; }
            if (!res.ok && res.status !== 404) {
                if (delBtn) { delBtn.disabled = false; delBtn.textContent = '删除'; }
                alert('删除失败：HTTP ' + res.status);
                return;
            }

            loadBackups();
        }

        async function toggleDetail(head) {
            const card = head.closest('.backup-card');
            const detail = card.querySelector('.backup-detail');
            const btn = head.querySelector('.toggle-btn');
            const clientType = card.getAttribute('data-client');

            if (detail.style.display !== 'none') {
                detail.style.display = 'none';
                btn.textContent = '查看内容';
                return;
            }

            if (!detail.dataset.loaded) {
                detail.innerHTML = '<div style="color:var(--text-light);">加载中…</div>';
                detail.style.display = 'block';
                btn.textContent = '收起';

                const token = getToken();
                let res;
                try {
                    res = await fetch(API_BASE + '/api/backups/' + encodeURIComponent(clientType), {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                } catch (e) {
                    detail.innerHTML = '<div style="color:var(--text-light);">无法连接服务器</div>';
                    return;
                }

                if (res.status === 401) {
                    showLoginPrompt();
                    return;
                }
                if (!res.ok) {
                    detail.innerHTML = '<div style="color:var(--text-light);">加载失败：HTTP ' + res.status + '</div>';
                    return;
                }

                const data = await res.json();
                detail.innerHTML = renderKindTree(data.config || {});
                detail.dataset.loaded = '1';

                // 绑定文件展开
                detail.querySelectorAll('[data-file-toggle]').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = el.getAttribute('data-file-toggle');
                        const pre = document.getElementById(id);
                        if (!pre) return;
                        pre.style.display = pre.style.display === 'none' ? 'block' : 'none';
                    });
                });
            } else {
                detail.style.display = 'block';
                btn.textContent = '收起';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderAuthNav();
            loadBackups();
        });
    </script>
</body>
</html>
